name: Build Godot APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: unzip dino_rush_admob.zip -d project

      - name: Remove AdMob plugin
        run: |
          rm -rf project/dino_admob/addons
          rm -rf project/dino_admob/android
          rm -f project/dino_admob/scripts/AdMobManager.gd
          cat > project/dino_admob/project.godot << 'EOF'
          ; Engine configuration file.
          config_version=5

          [application]

          config/name="Dino Rush"
          config/description="Dino Rush - Environment Changing Game"
          run/main_scene="res://scenes/Main.tscn"
          config/features=PackedStringArray("4.2", "GL Compatibility")
          config/icon="res://assets/dino.png"

          [display]

          window/size/viewport_width=900
          window/size/viewport_height=400
          window/stretch/mode="canvas_items"
          window/stretch/aspect="expand"

          [rendering]

          renderer/rendering_method="gl_compatibility"
          renderer/rendering_method.mobile="gl_compatibility"
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Setup Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.config/godot
          keytool -genkeypair -v \
            -keystore ~/.config/godot/debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Create Godot Editor Settings
        run: |
          printf '[gd_resource type="EditorSettings"]\n\n[resource]\nexport/android/debug_keystore="/home/runner/.config/godot/debug.keystore"\nexport/android/debug_keystore_user="androiddebugkey"\nexport/android/debug_keystore_pass="android"\nexport/android/android_sdk_path="/usr/local/lib/android/sdk"\n' > ~/.config/godot/editor_settings-4.tres

      - name: Create Export Preset
        run: |
          printf '[preset.0]\nname="Android"\nplatform="Android"\nrunnable=true\ndedicated_server=false\ncustom_features=""\nexport_filter="all_resources"\ninclude_filter=""\nexclude_filter=""\nexport_path="/home/runner/work/Dino_rush/Dino_rush/dino_rush.apk"\n\n[preset.0.options]\ncustom_build/use_custom_build=false\npackage/unique_name="com.wwish.dinorush"\npackage/name="Dino Rush"\npackage/signed=false\narchitectures/arm64-v8a=true\n' > project/dino_admob/export_presets.cfg

      - name: Build APK
        run: |
          godot --headless --path project/dino_admob --export-debug "Android" /home/runner/work/Dino_rush/Dino_rush/dino_rush.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dino-Rush-APK
          path: /home/runner/work/Dino_rush/Dino_rush/dino_rush.apk
