name: Build Godot APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: unzip dino_rush_admob.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Setup Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Create Export Preset
        run: |
          mkdir -p project/dino_admob
          cat > project/dino_admob/export_presets.cfg << 'EOF'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="/home/runner/work/Dino_rush/Dino_rush/dino_rush.apk"

          [preset.0.options]

          custom_build/use_custom_build=false
          package/unique_name="com.wwish.dinorush"
          package/name="Dino Rush"
          package/signed=false
          architectures/arm64-v8a=true
          EOF

      - name: Build APK
        run: |
          godot --headless --path project/dino_admob --export-debug "Android" /home/runner/work/Dino_rush/Dino_rush/dino_rush.apk
          ls -la /home/runner/work/Dino_rush/Dino_rush/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dino-Rush-APK
          path: /home/runner/work/Dino_rush/Dino_rush/dino_rush.apk
